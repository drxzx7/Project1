<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity AI • Institutional Market Analysis</title>
    <!-- Dependencies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/eternity_v2.css">
</head>
<body>
    <div class="aurora"></div>

    <div class="app-container">
        <!-- COLUMN 1: SIDEBAR -->
        <aside class="sidebar glass-card">
            <div class="logo-section">
                <i class="fas fa-infinity"></i>
                <span>Eternity</span>
            </div>
            
            <nav style="flex: 1;">
                <a href="#" class="nav-item active" onclick="switchView('dashboard')"><i data-lucide="layout-grid"></i> Dashboard</a>
                <a href="#" class="nav-item" onclick="switchView('markets')"><i data-lucide="bar-chart-2"></i> Markets</a>
                <a href="#" class="nav-item" onclick="switchView('trades')"><i data-lucide="arrow-left-right"></i> Trades</a>
                <a href="#" class="nav-item" onclick="switchView('portfolio')"><i data-lucide="pie-chart"></i> Portfolio</a>
                <a href="#" class="nav-item" onclick="switchView('settings')"><i data-lucide="settings"></i> Settings</a>
            </nav>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                <div style="display: flex; align-items: center; gap: 12px; color: var(--text-secondary); font-size: 13px;">
                    <i data-lucide="info" style="width: 16px;"></i>
                    <span>BSE Live Feed Active</span>
                </div>
            </div>
        </aside>

        <!-- COLUMN 2: MAIN DASHBOARD -->
        <main class="main-dashboard">
            <div class="top-bar glass-card">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search stocks, crypto, indices...">
                </div>
                
                <div class="user-profile">
                    <i data-lucide="bell" style="color: var(--text-secondary); cursor: pointer;"></i>
                    <div class="avatar">AM</div>
                </div>
            </div>

            <div class="content-body glass-card" id="mainContent">
                <div id="loadingState">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Initializing AI Models...</div>
                </div>
                <div id="dashboardContent" style="display: none; width: 100%; height: 100%;">
                    <!-- Rendered by app.js -->
                </div>
            </div>
        </main>

        <!-- COLUMN 3: TRADING ASSISTANT -->
        <aside class="trading-assistant glass-card">
            <div class="chat-header">
                <i data-lucide="bot"></i>
                <h3 style="font-family: 'Outfit'; font-size: 18px;">Trading Assistant</h3>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="chat-bubble ai-bubble">
                    Hello! I am your Eternity AI assistant. Analyzing BSE markets now... how can I guide your trades today?
                </div>
            </div>

            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" class="search-input" placeholder="Ask AI Assistant..." style="padding-left: 20px;" onkeypress="if(event.key==='Enter')sendChatMessage()">
                <button class="chat-send-btn" onclick="sendChatMessage()">
                    <i data-lucide="send" style="width: 16px;"></i>
                </button>
            </div>

            <button onclick="exportTrendReport()" class="nav-item" style="margin-top: 16px; width: 100%; justify-content: center; background: var(--accent-yellow); color: #000; font-weight: 700;">
                <i data-lucide="file-text"></i> Export Report
            </button>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/features.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
